services:
  # ==============================================
  # Database Service (MySQL)
  # ==============================================
  db:
    image: mysql:8.0
    container_name: attendance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: NewPassword123
      MYSQL_DATABASE: attendance_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Health check to ensure DB is accepting queries before Backend tries to boot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pNewPassword123"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==============================================
  # Backend Service (Spring Boot Application)
  # ==============================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inject configurations via standard Spring environment variables
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: NewPassword123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Standard JWT config overrides
      JWT_SECRET: your-auth-secret-key-minimum-32-characters-long
      JWT_QR_SECRET: your-qr-secret-key-must-be-different-from-auth

  # ==============================================
  # Frontend Service (React + Vite served by Nginx)
  # ==============================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      # Option to inject a custom backend URL if needed.
      # By default, it will fall back to /api, which is proxied to backend via Nginx
      args:
        - VITE_API_URL=/api
    container_name: attendance_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
