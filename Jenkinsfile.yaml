// ------------------------------------------------------------
// QR Attendance – CI/CD pipeline (Jenkins Declarative)
// ------------------------------------------------------------
pipeline {
    agent any

    // -----------------------------------------------------------------
    // GLOBAL ENVIRONMENT – credentials and static values
    // -----------------------------------------------------------------
    environment {
        // Docker Hub credentials (username + token) – ID: dockerhub
        DOCKER_HUB = credentials('dockerhub')   // creates USERNAME & PASSWORD vars

        // EC2 SSH credentials – ID: ec2-ssh
        EC2_SSH_KEY = credentials('ec2-ssh')   // provides SSH_PRIVATE_KEY

        // Static values – adjust if needed
        EC2_HOST        = '13.203.219.213'                     // EC2 public IP
        EC2_WORKDIR     = '~/Devops_project'                    // folder on EC2 with docker‑compose.yml
        BACKEND_IMG     = 'shubhamhalladamath/attendance-backend:latest'
        FRONTEND_IMG    = 'shubhamhalladamath/attendance-frontend:latest'
    }

    // -----------------------------------------------------------------
    // TRIGGER – GitHub webhook (no polling needed)
    // -----------------------------------------------------------------
    triggers {
        // When a GitHub push webhook hits Jenkins, this job starts automatically.
        // Do NOT enable pollSCM when using the webhook.
    }

    // -----------------------------------------------------------------
    // STAGES – sequential workflow
    // -----------------------------------------------------------------
    stages {

        stage('Checkout') {
            steps {
                // Pull the repo (the same commit that triggered the webhook)
                checkout scm
            }
        }

        stage('Docker Hub Login') {
            steps {
                script {
                    // Login to Docker Hub using the injected USERNAME/PASSWORD vars
                    sh """
                        echo "\$PASSWORD" | docker login -u "\$USERNAME" --password-stdin
                    """
                }
            }
        }

        stage('Build & Push Backend Image') {
            steps {
                script {
                    sh """
                        echo "=== Building Backend ==="
                        docker build -t ${BACKEND_IMG} ./Backend
                        echo "=== Pushing Backend ==="
                        docker push ${BACKEND_IMG}
                    """
                }
            }
        }

        stage('Build & Push Frontend Image') {
            steps {
                script {
                    sh """
                        echo "=== Building Frontend ==="
                        docker build --build-arg VITE_API_URL=/api -t ${FRONTEND_IMG} ./Frontend
                        echo "=== Pushing Frontend ==="
                        docker push ${FRONTEND_IMG}
                    """
                }
            }
        }

        stage('Deploy to EC2') {
            steps {
                // Use the SSH Agent plugin to load the private key into the agent.
                sshagent (credentials: ['ec2-ssh']) {
                    // Remote commands are executed over SSH.
                    // The key is provided automatically via SSH_AUTH_SOCK.
                    sh """
                        echo "=== Deploying to EC2 (${EC2_HOST}) ==="
                        ssh -o StrictHostKeyChecking=no ubuntu@${EC2_HOST} <<'EOS'
                            set -e
                            cd ${EC2_WORKDIR}
                            echo "Pulling latest images from Docker Hub..."
                            docker compose pull
                            echo "Re‑creating containers..."
                            docker compose up -d
                        EOS
                    """
                }
            }
        }
    }

    // -----------------------------------------------------------------
    // POST – notifications & cleanup
    // -----------------------------------------------------------------
    post {
        success {
            echo '✅ Pipeline succeeded – new images are live on EC2.'
        }
        failure {
            echo '❌ Pipeline failed – check the console output for details.'
        }
        always {
            // Optional: clean any temporary files (none used here)
        }
    }
}
